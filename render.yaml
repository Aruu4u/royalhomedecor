services:
  - type: web
    name: luxury-furniture-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/live
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9